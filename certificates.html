<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aryan Sonawane - Certificates</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="shortcut icon" href="./userAsset/small-c.gif" type="image/x-icon">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&display=swap');

        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background-color: #0a0a0c;
            color: white;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .cert-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            position: relative;
            z-index: 1;
        }

        .cert-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 1.5rem;
        }

        .cert-title-section h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(to right, #ffffff, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .cert-title-section p {
            color: #a1a1aa;
            margin-top: 0.5rem;
            font-size: 0.95rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #c084fc;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 0.6rem 1.2rem;
            border-radius: 30px;
            background: rgba(192, 132, 252, 0.05);
            border: 1px solid rgba(192, 132, 252, 0.2);
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: rgba(192, 132, 252, 0.15);
            border-color: rgba(192, 132, 252, 0.4);
            transform: translateX(-4px);
        }

        .cert-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2.5rem;
            margin-top: 2rem;
        }

        .cert-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .cert-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 100%;
            background: linear-gradient(180deg, rgba(192, 132, 252, 0.05) 0%, rgba(0,0,0,0) 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .cert-card:hover {
            transform: translateY(-8px);
            border-color: rgba(192, 132, 252, 0.3);
            box-shadow: 0 15px 35px rgba(192, 132, 252, 0.1);
        }

        .cert-card:hover::before {
            opacity: 1;
        }

        .cert-image-container {
            width: 100%;
            aspect-ratio: 16 / 11;
            overflow: hidden;
            background: #18181b;
            position: relative;
            cursor: zoom-in;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .cert-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .cert-card:hover .cert-image {
            transform: scale(1.03);
        }

        .cert-info {
            padding: 1.5rem;
        }

        .cert-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: rgba(192, 132, 252, 0.1);
            color: #c084fc;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.75rem;
        }

        .cert-name {
            font-size: 1.25rem;
            font-weight: 700;
            color: #ffffff;
            margin: 0 0 0.5rem 0;
            line-height: 1.4;
        }

        .cert-issuer {
            font-size: 0.9rem;
            color: #a1a1aa;
            margin: 0 0 1rem 0;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .cert-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 1rem;
            margin-top: 1rem;
        }

        .cert-date {
            font-size: 0.8rem;
            color: #71717a;
        }

        .cert-view-btn {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            transition: color 0.2s ease;
        }

        .cert-view-btn:hover {
            color: #c084fc;
        }

        /* Modal styling for viewing certificate fullscreen */
        .cert-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .cert-modal.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            max-width: 90%;
            max-height: 85vh;
            border-radius: 8px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
            object-fit: contain;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .cert-modal.active .modal-content {
            transform: scale(1);
        }

        .close-modal {
            position: absolute;
            top: 1.5rem;
            right: 2rem;
            color: white;
            font-size: 2.5rem;
            cursor: pointer;
            transition: color 0.2s ease;
            background: none;
            border: none;
            outline: none;
        }

        .close-modal:hover {
            color: #c084fc;
        }

        @media (max-width: 768px) {
            .cert-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1.5rem;
            }
            .cert-title-section h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="cert-wrapper">
        <header class="cert-header">
            <div class="cert-title-section">
                <h1>Achievements & Certificates</h1>
                <p>A compilation of my verified accomplishments, hackathons, and certifications.</p>
            </div>
            <a href="./index.html" class="back-link">
                <span>&larr; Back to Portfolio</span>
            </a>
        </header>

        <main class="cert-grid">
            <!-- Quantum Hacks 2026 Certificate -->
            <div class="cert-card">
                <div class="cert-image-container" onclick="openModal('./userAsset/quantum_hacks_certificate.jpg')">
                    <img src="./userAsset/quantum_hacks_certificate.jpg" alt="Quantum Hacks 2026 Finalist Certificate" class="cert-image">
                </div>
                <div class="cert-info">
                    <span class="cert-badge">Hackathon Finalist</span>
                    <h3 class="cert-name">Quantum Hacks 2026 - Finalist</h3>
                    <p class="cert-issuer">Issued by RKDEMY-TECHSKILL</p>
                    <div class="cert-footer">
                        <span class="cert-date">April 11, 2026</span>
                        <a href="#" class="cert-view-btn" onclick="event.preventDefault(); openModal('./userAsset/quantum_hacks_certificate.jpg')">
                            View Fullscreen &rarr;
                        </a>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Fullscreen Viewer Modal -->
    <div class="cert-modal" id="certModal" onclick="closeModal()">
        <button class="close-modal" onclick="closeModal()">&times;</button>
        <img src="" alt="Fullscreen Certificate" class="modal-content" id="modalImg" onclick="event.stopPropagation()">
    </div>

    <script src="https://kit.fontawesome.com/58a810656e.js" crossorigin="anonymous"></script>
    <script type="module" src="./script.js"></script>

    <!-- Custom Cursor -->
    <div class="cursor-dot"></div>
    <div class="cursor-ring"></div>

    <script>
        function openModal(imgSrc) {
            const modal = document.getElementById('certModal');
            const modalImg = document.getElementById('modalImg');
            modalImg.src = imgSrc;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('certModal');
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }
    </script>
</body>
</html>
